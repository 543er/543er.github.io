<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Dev Workspace</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f2f5; }
        #app { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status { color: blue; font-weight: bold; margin-bottom: 10px; display: block; }
        #chat { height: 200px; border: 1px solid #ccc; overflow-y: scroll; margin: 10px 0; padding: 10px; background: #fafafa; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:active { background: #0056b3; }
        .error { color: red; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="app">
    <span id="status">Inicializace...</span>
    
    <div><strong>Tvoje ID:</strong> <span id="my-id">Čekám na server...</span></div>
    
    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="remote-id" placeholder="Vlož ID kámoše">
        <button onclick="connect()">1. PŘIPOJIT KÁMOŠE</button>
        <hr>
        <input type="text" id="msg-input" placeholder="Napiš zprávu">
        <button onclick="send()" style="background: #28a745;">2. ODESLAT</button>
    </div>
    <div id="debug" class="error"></div>
</div>

<script>
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const chat = document.getElementById('chat');
    
    // Vytvoření Peeru s připojením na veřejný Google STUN server
    const peer = new Peer(undefined, {
        config: {'iceServers': [{ url: 'stun:://google.com' }]},
        debug: 3 // Tohle vypíše chyby do konzole (F12)
    });

    let conn = null;

    // 1. Server ti přidělil ID
    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        status.innerText = "ONLINE - Čekám na spojení";
        status.style.color = "green";
    });

    // 2. Někdo jiný se připojuje k TOBĚ
    peer.on('connection', c => {
        conn = c;
        bindEvents();
        status.innerText = "SPOJENO (Příchozí)";
    });

    // 3. Ty se připojuješ ke KÁMOŠOVI
    function connect() {
        const id = document.getElementById('remote-id').value;
        if (!id) { debug.innerText = "Chyba: Musíš zadat ID!"; return; }
        
        status.innerText = "Připojování...";
        conn = peer.connect(id);
        bindEvents();
    }

    function bindEvents() {
        conn.on('open', () => {
            status.innerText = "SPOJENO!";
            status.style.color = "orange";
            chat.innerHTML += `<div><i>--- Spojení navázáno ---</i></div>`;
        });

        conn.on('data', data => {
            chat.innerHTML += `<div><b>Kámoš:</b> ${data}</div>`;
            chat.scrollTop = chat.scrollHeight;
        });

        conn.on('error', err => {
            debug.innerText = "Chyba spojení: " + err;
        });
    }

    // 4. Odesílání
    function send() {
        const input = document.getElementById('msg-input');
        if (!conn || !conn.open) {
            debug.innerText = "Chyba: Nejsi připojený!";
            return;
        }
        if (input.value) {
            conn.send(input.value);
            chat.innerHTML += `<div><b>Já:</b> ${input.value}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;
            debug.innerText = ""; // Smaže případné chyby
        }
    }

    // Zachycení chyb samotného Peeru
    peer.on('error', err => {
        debug.innerText = "Peer Error: " + err.type;
        console.error(err);
    });
</script>

</body>
</html>
