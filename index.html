<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Docs</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #ffffff; --border: #e2e8f0; --text: #1e293b; --accent: #2563eb; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; font-size: 13px; }
        .status { color: #10b981; font-weight: 600; }

        main { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; box-sizing: border-box; }
        
        #conn-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .id-label { font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .my-id-val { font-family: monospace; font-weight: bold; background: #fff; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }

        #chat { flex: 1; border: 1px solid var(--border); border-radius: 8px; overflow-y: auto; padding: 15px; background: #fff; margin-bottom: 15px; }
        .msg { margin-bottom: 10px; font-size: 14px; }
        .msg b { color: var(--accent); margin-right: 8px; }
        .msg.sys { color: #94a3b8; font-style: italic; }

        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        button:disabled { background: #cbd5e1; }
    </style>
</head>
<body>

<header>
    <span>Project Documentation / Shared_Notes</span>
    <span class="status" id="status">INITIALIZING...</span>
</header>

<main>
    <div id="conn-box">
        <span class="id-label">Vaše lokální ID:</span>
        <span id="my-id" class="my-id-val">Generování...</span>
        
        <div class="input-row" style="margin-top: 15px;">
            <input type="text" id="remote-id" placeholder="Vložte ID partnera...">
            <button onclick="connect()">PŘIPOJIT</button>
        </div>
    </div>

    <div id="chat">
        <div class="msg sys">Systém připraven k propojení.</div>
    </div>

    <div class="input-row">
        <input type="text" id="msg-input" placeholder="Napište zprávu..." onkeypress="if(event.key==='Enter') send()">
        <button id="send-btn" onclick="send()">ODESLAT</button>
    </div>
</main>

<script>
    const peer = new Peer(undefined, {
        config: { 'iceServers': [{ url: 'stun:://google.com' }] }
    });

    let conn;

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "ONLINE (ID READY)";
    });

    // Čekání na příchozí spojení
    peer.on('connection', c => {
        if (conn) conn.close(); // Povolíme vždy jen jedno aktivní spojení
        conn = c;
        setupHandler();
        addMsg("SYSTEM", "Uživatel se připojil.");
    });

    function connect() {
        const rId = document.getElementById('remote-id').value;
        if (!rId) return;
        conn = peer.connect(rId);
        setupHandler();
    }

    function setupHandler() {
        conn.on('open', () => {
            document.getElementById('status').innerText = "CONNECTED";
            addMsg("SYSTEM", "Spojení navázáno.");
        });
        conn.on('data', data => addMsg("PARTNER", data));
        conn.on('close', () => {
            document.getElementById('status').innerText = "DISCONNECTED";
            addMsg("SYSTEM", "Spojení bylo ukončeno.");
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (conn && conn.open && input.value) {
            conn.send(input.value);
            addMsg("MNE", input.value);
            input.value = "";
        }
    }

    function addMsg(user, text) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = "msg" + (user === "SYSTEM" ? " sys" : "");
        div.innerHTML = `<b>${user}:</b> ${text}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
