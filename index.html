<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ID Chat</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

#container{
max-width:700px;
margin:auto;
}

#chat{
border:1px solid #444;
height:350px;
overflow-y:auto;
padding:10px;
margin-top:20px;
background:#181818;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:5px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#myid{
font-weight:bold;
font-size:18px;
color:#00ff9d;
}

</style>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

</head>

<body>

<div id="container">

<h2>Private ID Chat</h2>

<p>Your ID:</p>
<div id="myid">Generating...</div>

<br>

<input id="peerid" placeholder="Enter friend ID">
<button onclick="connectPeer()">Connect</button>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>

</div>

<script>

let peer
let connection

function start(){

peer = new Peer()

peer.on("open", id => {

document.getElementById("myid").textContent = id

})

peer.on("connection", conn => {

connection = conn
setupConnection()

})

}

function connectPeer(){

const id = document.getElementById("peerid").value

connection = peer.connect(id)

setupConnection()

}

function setupConnection(){

connection.on("open", () => {

addMessage("Connected!")

})

connection.on("data", data => {

addMessage("Friend: " + data)

})

}

function sendMsg(){

const input = document.getElementById("msg")
const text = input.value

if(!connection || text==="") return

connection.send(text)

addMessage("You: " + text)

input.value=""

}

function addMessage(msg){

const div = document.createElement("div")
div.textContent = msg

document.getElementById("chat").appendChild(div)

document.getElementById("chat").scrollTop =
document.getElementById("chat").scrollHeight

}

start()

</script>

</body>
</html>
