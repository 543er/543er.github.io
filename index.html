<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat lásky</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

#container{
max-width:700px;
margin:auto;
}

#chat{
border:1px solid #444;
height:350px;
overflow-y:auto;
padding:10px;
margin-top:20px;
background:#181818;
}

input,select{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:5px;
background:#4CAF50;
color:white;
cursor:pointer;
}

#myid{
font-weight:bold;
font-size:18px;
color:#00ff9d;
}

</style>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

</head>

<body>

<div id="container">

<h2>Chat lásky</h2>

<p>Tvoje ID:</p>
<div id="myid">Generování kódu lásky...</div>

<br>

<label>Typ ID:</label>

<select id="idmode">
<option value="random">Random ID</option>
<option value="length">Random ID (custom length)</option>
<option value="stable">Stable ID</option>
<option value="stablelength">Stable ID (custom length)</option>
</select>

<br>

<input id="idlength" placeholder="Length (1-50)">
<input id="customid" placeholder="Your custom ID">

<br>

<button onclick="restartPeer()">Generate / Apply</button>

<hr>

<input id="peerid" placeholder="Enter friend ID">
<button onclick="connectPeer()">Připojit</button>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Poslat</button>

</div>

<script>

let peer
let connection

const idmode=document.getElementById("idmode")
const idlength=document.getElementById("idlength")
const customid=document.getElementById("customid")

function randomID(len){

const chars="abcdefghijklmnopqrstuvwxyz0123456789"
let result=""

for(let i=0;i<len;i++){
result+=chars[Math.floor(Math.random()*chars.length)]
}

return result

}

function start(peerID){

if(peer) peer.destroy()

peer = peerID ? new Peer(peerID) : new Peer()

peer.on("open",id=>{
document.getElementById("myid").textContent=id
})

peer.on("connection",conn=>{
connection=conn
setupConnection()
})

}

function restartPeer(){

let mode=idmode.value
let len=parseInt(idlength.value)

if(mode==="random"){
start()
}

if(mode==="length"){

if(!len || len<1 || len>50){
alert("Length must be between 1 and 50")
return
}

start(randomID(len))
}

if(mode==="stable"){

let id=customid.value.trim()

if(id===""){
alert("Enter custom ID")
return
}

start(id)
}

if(mode==="stablelength"){

let id=customid.value.trim()

if(!len || len<1 || len>50){
alert("Length must be between 1 and 50")
return
}

if(id.length!==len){
alert("ID must be exactly "+len+" characters")
return
}

start(id)
}

}

function connectPeer(){

const id=document.getElementById("peerid").value

connection=peer.connect(id)

setupConnection()

}

function setupConnection(){

connection.on("open",()=>{
addMessage("Connected!")
})

connection.on("data",data=>{
addMessage("Friend: "+data)
})

}

function sendMsg(){

const input=document.getElementById("msg")
const text=input.value

if(!connection || text==="") return

connection.send(text)

addMessage("You: "+text)

input.value=""

}

function addMessage(msg){

const div=document.createElement("div")
div.textContent=msg

document.getElementById("chat").appendChild(div)

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight

}

start()

</script>

</body>
</html>
