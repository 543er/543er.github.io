<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt: Informatika - Dokumentace</title>
    <!-- Knihovna pro Peer-to-Peer spojení -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { --green: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        
        /* Kamuflážní záhlaví */
        header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 0.8rem; opacity: 0.7; }
        
        #connection-area { background: #1a1a1a; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        #my-id { font-weight: bold; color: white; background: #333; padding: 2px 8px; }
        
        #chat-box { flex-grow: 1; border: 1px solid #333; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.5); margin-bottom: 10px; border-radius: 5px; }
        .msg { margin-bottom: 8px; border-left: 2px solid var(--green); padding-left: 10px; }
        .msg.me { border-left-color: #555; color: #aaa; }

        .controls { display: flex; gap: 10px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; flex-grow: 1; outline: none; }
        input:focus { border-color: var(--green); }
        button { background: var(--green); color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00cc33; }
        button.call-btn { background: #ff3333; color: white; }

        #remote-video { width: 200px; position: fixed; bottom: 80px; right: 20px; border: 2px solid var(--green); background: black; display: none; }
        
        /* Panic Button */
        #panic { position: fixed; top: 10px; right: 10px; font-size: 0.6rem; background: transparent; color: #333; border: 1px solid #333; padding: 5px; }
    </style>
</head>
<body>

    <header>
        GITHUB_PAGES // PROJECT_ID: [TVOJE_JMENO]_SECURE_COMM // STATUS: ENCRYPTED
        <button id="panic" onclick="panic()">PANIC (ESC)</button>
    </header>

    <div id="connection-area">
        <p>MOJE_ID: <span id="my-id">Načítám...</span></p>
        <div class="controls">
            <input type="text" id="remote-id" placeholder="Vlož ID kámoše...">
            <button onclick="connectToFriend()">PŘIPOJIT CHAT</button>
            <button class="call-btn" onclick="startCall()">VOLAT</button>
        </div>
    </div>

    <div id="chat-box">
        <div class="msg">Systém inicializován... Čekám na spojení.</div>
    </div>

    <div class="controls">
        <input type="text" id="message-input" placeholder="Zadej zprávu..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">ODESLAT</button>
    </div>

    <video id="remote-video" autoplay playsinline></video>

    <script>
        const peer = new Peer(); 
        let conn;

        // 1. Vygenerování tvého ID
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 2. Příjem chatu
        peer.on('connection', (c) => {
            conn = c;
            setupChat();
            addLog("Kámoš se připojil.");
        });

        // 3. Příjem hovoru
        peer.on('call', (call) => {
            if(confirm("Někdo ti volá! Přijmout?")) {
                navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                    call.answer(stream);
                    const video = document.getElementById('remote-video');
                    video.style.display = "block";
                    call.on('stream', (remoteStream) => {
                        video.srcObject = remoteStream;
                    });
                });
            }
        });

        // Funkce pro připojení k druhému
        function connectToFriend() {
            const id = document.getElementById('remote-id').value;
            if(!id) return alert("Musíš zadat ID!");
            conn = peer.connect(id);
            setupChat();
            addLog("Pokus o připojení k: " + id);
        }

        function setupChat() {
            conn.on('data', (data) => {
                addLog(data, "friend");
            });
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const msg = input.value;
            if(conn && msg) {
                conn.send(msg);
                addLog(msg, "me");
                input.value = "";
            }
        }

        function startCall() {
            const id = document.getElementById('remote-id').value;
            navigator.mediaDevices.getUserMedia({video: false, audio: true}).then((stream) => {
                const call = peer.call(id, stream);
                const video = document.getElementById('remote-video');
                video.style.display = "block";
                call.on('stream', (remoteStream) => {
                    video.srcObject = remoteStream;
                });
            });
        }

        function addLog(text, type) {
            const chat = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "msg" + (type === "me" ? " me" : "");
            div.innerHTML = `<b>${type === "me" ? "JÁ" : "KÁMOŠ"}:</b> ${text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Panic Button funkce
        function panic() {
            window.location.href = "https://wikipedia.org";
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === "Escape") panic();
        });
    </script>
</body>
</html>
